{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Log in</h1>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="mb-4 px-4 py-2 rounded bg-red-50 text-red-700 border border-red-200 text-sm">
            {{ form.non_field_errors }}
          </div>
        {% endif %}
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          {{ form.errors.username }}
          <input type="text" name="username" autofocus autocomplete="username"
                 value="{{ form.username.value|default:'' }}"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" autocomplete="current-password"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
        <button type="submit"
                class="w-full py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors">
          Log in
        </button>
      </form>
    </div>
    <p class="text-center text-sm text-gray-500 mt-4">
      No account? <a href="{% url 'register' %}" class="text-emerald-600 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
