<li class="tag-row flex items-center justify-between">
  <span class="px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full text-sm">{{ tag.name }}</span>
  <form hx-post="{% url 'tag-delete' tag.pk %}"
        hx-target="closest .tag-row"
        hx-swap="outerHTML"
        hx-confirm='Delete tag "{{ tag.name }}"?'>
    {% csrf_token %}
    <button type="submit" class="text-xs text-red-400 hover:text-red-600">Delete</button>
  </form>
</li>
