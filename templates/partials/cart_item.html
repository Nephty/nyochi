{% load recipe_extras %}
<li id="cart-item-{{ item.pk }}"
    class="flex items-center gap-3 px-5 py-3 {% if item.in_cart %}cart-item-checked{% endif %}">
  <button type="button"
          hx-post="{% url 'toggle-cart-item' item.pk %}"
          hx-target="#cart-item-{{ item.pk }}"
          hx-swap="outerHTML"
          class="shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors
                 {% if item.in_cart %}bg-emerald-500 border-emerald-500{% else %}border-gray-300 hover:border-emerald-400{% endif %}">
    {% if item.in_cart %}
      <svg class="w-3 h-3 text-white" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 6l3 3 5-5"/>
      </svg>
    {% endif %}
  </button>
  <div class="flex-1 min-w-0 leading-relaxed">
    <span class="text-sm align-middle {% if item.in_cart %}line-through text-gray-400{% endif %}">{{ item.ingredient.name }}</span>{% with names=ingredient_recipes|get_item:item.ingredient_id %}{% for name in names %}<span class="inline-block align-middle text-xs px-1.5 py-0.5 ml-1 bg-gray-100 text-gray-500 rounded-full {% if item.in_cart %}opacity-50{% endif %}">{{ name }}</span>{% endfor %}{% endwith %}
  </div>
  <span class="text-sm font-medium shrink-0 {% if item.in_cart %}text-gray-300{% else %}text-gray-600{% endif %}">
    {{ item.quantity|floatformat:"-2" }} {{ item.unit.abbreviation }}
  </span>
</li>
