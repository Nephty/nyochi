{% load recipe_extras %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Recipe Book{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Clickable tag pill toggle */
    .tag-pill-label { position: relative; }
    .tag-pill-label input[type=checkbox] { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
    .tag-pill {
      display: inline-block; padding: 2px 12px; border-radius: 9999px;
      border: 1px solid #d1d5db; background: #f9fafb; color: #4b5563;
      font-size: 0.75rem; line-height: 1.75; cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .tag-pill-label input[type=checkbox]:checked ~ .tag-pill {
      background: #10b981; color: white; border-color: #10b981;
    }
  </style>
</head>
<body class="min-h-full bg-gray-50 text-gray-900">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <a href="{% url 'recipe-list' %}" class="font-semibold text-lg text-emerald-700">Recipe Book</a>

        <!-- Desktop links -->
        <div class="hidden sm:flex gap-6 text-sm font-medium">
          <a href="{% url 'recipe-list' %}" class="hover:text-emerald-700 {% if request.resolver_match.url_name == 'recipe-list' %}text-emerald-700{% endif %}">Recipes</a>
          <a href="{% url 'ingredient-list' %}" class="hover:text-emerald-700 {% if 'ingredient' in request.resolver_match.url_name %}text-emerald-700{% endif %}">Ingredients</a>
          <a href="{% url 'grocery-list' %}" class="hover:text-emerald-700 {% if request.resolver_match.url_name == 'grocery-list' %}text-emerald-700{% endif %}">Grocery List</a>
          <a href="{% url 'recipe-selector' %}" class="hover:text-emerald-700 {% if request.resolver_match.url_name == 'recipe-selector' %}text-emerald-700{% endif %}">Find Recipes</a>
          <a href="{% url 'tag-list' %}" class="hover:text-emerald-700 {% if request.resolver_match.url_name == 'tag-list' %}text-emerald-700{% endif %}">Tags</a>
        </div>

        <!-- Mobile hamburger -->
        <button id="nav-toggle" class="sm:hidden p-2 rounded text-gray-600 hover:bg-gray-100">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <!-- Mobile menu -->
      <div id="nav-menu" class="sm:hidden hidden pb-3 flex flex-col gap-2 text-sm font-medium border-t border-gray-100 pt-2">
        <a href="{% url 'recipe-list' %}" class="px-2 py-1 rounded hover:bg-gray-50">Recipes</a>
        <a href="{% url 'ingredient-list' %}" class="px-2 py-1 rounded hover:bg-gray-50">Ingredients</a>
        <a href="{% url 'grocery-list' %}" class="px-2 py-1 rounded hover:bg-gray-50">Grocery List</a>
        <a href="{% url 'recipe-selector' %}" class="px-2 py-1 rounded hover:bg-gray-50">Find Recipes</a>
        <a href="{% url 'tag-list' %}" class="px-2 py-1 rounded hover:bg-gray-50">Tags</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% if messages %}
      {% for msg in messages %}
        <div class="mb-4 px-4 py-2 rounded bg-emerald-50 text-emerald-800 border border-emerald-200">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script>
    document.getElementById('nav-toggle').addEventListener('click', () => {
      document.getElementById('nav-menu').classList.toggle('hidden');
    });
  </script>
</body>
</html>
